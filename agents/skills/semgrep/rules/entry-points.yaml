rules:
  # ──────────────────────────────────────────────
  # Application entry points
  # ──────────────────────────────────────────────
  - id: entry-main-function
    pattern: |
      int main(...) { ... }
    message: "Entry point: main() — direct CLI attack surface"
    languages: [c, cpp]
    severity: INFO
    metadata:
      category: entry-point
      surface: cli

  # ──────────────────────────────────────────────
  # Network I/O
  # ──────────────────────────────────────────────
  - id: entry-network-recv
    patterns:
      - pattern: recv($SOCK, $BUF, $LEN, $FLAGS)
    message: "Network I/O: recv() — untrusted data enters here"
    languages: [c, cpp]
    severity: INFO
    metadata:
      category: entry-point
      surface: network

  - id: entry-network-recvfrom
    pattern: recvfrom($SOCK, $BUF, $LEN, ...)
    message: "Network I/O: recvfrom() — untrusted data enters here"
    languages: [c, cpp]
    severity: INFO
    metadata:
      category: entry-point
      surface: network

  # ──────────────────────────────────────────────
  # File I/O
  # ──────────────────────────────────────────────
  - id: entry-file-fread
    pattern: fread($BUF, $SIZE, $N, $FILE)
    message: "File I/O: fread() — data from file enters here"
    languages: [c, cpp]
    severity: INFO
    metadata:
      category: entry-point
      surface: file

  - id: entry-file-fgets
    pattern: fgets($BUF, $SIZE, $FILE)
    message: "File I/O: fgets() — data from file enters here"
    languages: [c, cpp]
    severity: INFO
    metadata:
      category: entry-point
      surface: file

  - id: entry-file-fscanf
    pattern: fscanf($FILE, $FMT, ...)
    message: "File I/O: fscanf() — data from file enters here"
    languages: [c, cpp]
    severity: INFO
    metadata:
      category: entry-point
      surface: file

  # ──────────────────────────────────────────────
  # CLI / Environment
  # ──────────────────────────────────────────────
  - id: entry-getenv
    pattern: getenv($VAR)
    message: "Environment variable input: getenv() — attacker-controlled on many deployments"
    languages: [c, cpp]
    severity: INFO
    metadata:
      category: entry-point
      surface: env
