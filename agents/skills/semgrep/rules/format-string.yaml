rules:
  # ──────────────────────────────────────────────
  # printf-family with non-literal format string
  # CWE-134: Use of Externally-Controlled Format String
  # ──────────────────────────────────────────────
  - id: format-string-printf
    patterns:
      - pattern: printf($FMT, ...)
      - pattern-not: printf("...", ...)
    message: |
      Non-literal format string in printf($FMT) — if $FMT is user-controlled
      this is an arbitrary read/write (format string attack, CWE-134).
    languages: [c, cpp]
    severity: ERROR
    metadata:
      cwe: CWE-134
      category: format-string

  - id: format-string-fprintf
    patterns:
      - pattern: fprintf($FILE, $FMT, ...)
      - pattern-not: fprintf($FILE, "...", ...)
    message: |
      Non-literal format string in fprintf — same risk as printf.
    languages: [c, cpp]
    severity: ERROR
    metadata:
      cwe: CWE-134
      category: format-string

  - id: format-string-sprintf
    patterns:
      - pattern: sprintf($BUF, $FMT, ...)
      - pattern-not: sprintf($BUF, "...", ...)
    message: |
      Non-literal format string in sprintf — format string attack plus
      unbounded write (double risk).
    languages: [c, cpp]
    severity: ERROR
    metadata:
      cwe: CWE-134
      category: format-string

  - id: format-string-snprintf
    patterns:
      - pattern: snprintf($BUF, $SIZE, $FMT, ...)
      - pattern-not: snprintf($BUF, $SIZE, "...", ...)
    message: |
      Non-literal format string in snprintf — bounds-safe write but still
      allows %n arbitrary write and information disclosure.
    languages: [c, cpp]
    severity: WARNING
    metadata:
      cwe: CWE-134
      category: format-string

  - id: format-string-syslog
    patterns:
      - pattern: syslog($PRIO, $FMT, ...)
      - pattern-not: syslog($PRIO, "...", ...)
    message: |
      Non-literal format string in syslog — format string attack.
    languages: [c, cpp]
    severity: ERROR
    metadata:
      cwe: CWE-134
      category: format-string
