rules:
  # ──────────────────────────────────────────────
  # malloc / calloc / realloc without NULL check
  # Dereference directly after allocation = NULL deref on OOM
  # ──────────────────────────────────────────────
  - id: malloc-no-null-check-deref
    patterns:
      - pattern: |
          $P = malloc($SIZE);
          $P->$FIELD = ...;
      - pattern-not: |
          $P = malloc($SIZE);
          if ($P == NULL) { ... }
          $P->$FIELD = ...;
    message: |
      malloc() result dereferenced without NULL check — crashes on OOM.
      On some systems this is exploitable (NULL-deref with mmap at 0).
    languages: [c, cpp]
    severity: WARNING
    metadata:
      cwe: CWE-476
      category: null-deref

  - id: calloc-no-null-check-deref
    patterns:
      - pattern: |
          $P = calloc($N, $SIZE);
          $P->$FIELD = ...;
      - pattern-not: |
          $P = calloc($N, $SIZE);
          if ($P == NULL) { ... }
          $P->$FIELD = ...;
    message: |
      calloc() result dereferenced without NULL check.
    languages: [c, cpp]
    severity: WARNING
    metadata:
      cwe: CWE-476
      category: null-deref

  # ──────────────────────────────────────────────
  # realloc misuse — common pattern that loses original pointer on failure
  # ──────────────────────────────────────────────
  - id: realloc-overwrites-ptr
    pattern: $P = realloc($P, $SIZE)
    message: |
      realloc() result stored back to $P — if realloc returns NULL the
      original pointer is lost (memory leak + potential use-after-free).
      Use a temporary: tmp = realloc($P, $SIZE); if (tmp) $P = tmp;
    languages: [c, cpp]
    severity: WARNING
    metadata:
      cwe: CWE-401
      category: memory-management

  # ──────────────────────────────────────────────
  # Integer used directly as allocation size without validation
  # Commonly seen as: malloc(user_len) or malloc(count * elem_size)
  # ──────────────────────────────────────────────
  - id: malloc-size-from-input
    patterns:
      - pattern: malloc($LEN)
      - pattern-not: malloc(sizeof(...))
      - pattern-not: malloc(sizeof $TYPE)
    message: |
      malloc($LEN) — if $LEN comes from untrusted input and is not
      validated, this can allocate an undersized buffer or wrap to 0/small
      on integer overflow, leading to heap overflow on subsequent writes.
    languages: [c, cpp]
    severity: INFO
    metadata:
      cwe: CWE-190
      category: integer-issue
