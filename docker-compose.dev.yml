version: '3.8'

services:
  # PostgreSQL 数据库（与生产环境一致）
  postgres:
    image: postgres:16
    container_name: dokploy-postgres-dev
    restart: unless-stopped
    ports:
      - "25432:5432"
    environment:
      - POSTGRES_USER=dokploy
      - POSTGRES_PASSWORD=dokploy_dev_password
      - POSTGRES_DB=dokploy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存服务（与生产环境一致）
  redis:
    image: redis:7
    container_name: dokploy-redis-dev
    restart: unless-stopped
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dokploy-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dokploy 主应用（开发模式）
  dokploy-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        HTTP_PROXY: http://172.17.0.1:9870
        HTTPS_PROXY: http://172.17.0.1:9870
        http_proxy: http://172.17.0.1:9870
        https_proxy: http://172.17.0.1:9870
    container_name: dokploy-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "23000:3000"    # 主应用端口
      - "29229:9229"    # Node.js 调试端口
      - "25555:5555"    # 数据库管理工具端口 (Drizzle Studio)
    volumes:
      # 挂载源代码，实现热重载
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./agents:/app/agents
      - ./package.json:/app/package.json
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./tsconfig.json:/app/tsconfig.json
      - ./.env.production:/app/.env
      
      # 挂载 node_modules 为命名卷，避免与宿主机冲突
      - node_modules:/app/node_modules
      - dokploy_node_modules:/app/apps/dokploy/node_modules
      - server_node_modules:/app/packages/server/node_modules
      
      # 挂载 Docker socket，允许容器内管理 Docker
      - /var/run/docker.sock:/var/run/docker.sock

      # 挂载 scan runtime 上下文；容器内服务也会把这个宿主机路径传给 task 容器
      - ${DOKPLOY_SCAN_CONTEXT_HOST_PATH:-/data/exp/dkzou/dokploy-data}:/scan-context
      
      # 持久化配置和数据目录
      - dokploy_data:/etc/dokploy
      - docker_config:/root/.docker
    environment:
      # 开发环境配置
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      
      # 数据库配置
      - DATABASE_URL=postgresql://dokploy:dokploy_dev_password@dokploy-postgres-dev:5432/dokploy
      
      # Redis 配置
      - REDIS_URL=redis://dokploy-redis-dev:6379
      
      # Dokploy 配置（参考生产环境）
      - ADVERTISE_ADDR=${ADVERTISE_ADDR:-127.0.0.1}
      - DOKPLOY_SCAN_CONTEXT_HOST_PATH=${DOKPLOY_SCAN_CONTEXT_HOST_PATH:-/data/exp/dkzou/dokploy-data}
    privileged: true  # 需要访问 Docker socket
    networks:
      - dokploy-dev-network
    stdin_open: true
    tty: true

  # Traefik 反向代理（可选，用于测试域名和 SSL）
  traefik:
    image: traefik:v3.5.0
    container_name: dokploy-traefik-dev
    restart: unless-stopped
    ports:
      - "20080:80"      # HTTP
      - "28080:8080"    # Traefik Dashboard
      # 如果需要测试 HTTPS，可以启用下面的端口
      # - "20443:443"     # HTTPS
      # - "20443:443/udp" # HTTP/3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/etc/traefik
      # 如果有自定义配置，可以挂载
      # - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # - ./traefik/dynamic:/etc/dokploy/traefik/dynamic:ro
    command:
      # 启用 API 和 Dashboard
      - "--api.insecure=true"
      - "--api.dashboard=true"
      
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=dokploy-dev-network"
      
      # 入口点
      - "--entrypoints.web.address=:80"
      # - "--entrypoints.websecure.address=:443"
      
      # 日志
      - "--log.level=DEBUG"
      - "--accesslog=true"
    networks:
      - dokploy-dev-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"

volumes:
  node_modules:
  dokploy_node_modules:
  server_node_modules:
  dokploy_data:
  docker_config:
  postgres_data:
  redis_data:
  traefik_data:

networks:
  dokploy-dev-network:
    external: true
    name: dokploy-dev-network
