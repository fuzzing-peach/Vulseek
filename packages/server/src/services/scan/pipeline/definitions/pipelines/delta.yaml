delta:
  name: delta-scan-programmatic
  root: delta-scope
  stages:
    - delta-scope
    - scan-target
    - analyze-finding
    - critique-finding
    - verify-finding
    - triage-finding
  edges:
    - name: delta-scope-to-function
      from: delta-scope
      to: scan-target
      fork: false
      mode: fanOut
      foreach: "$.functions[*]"
      input:
        scanJob: "$ctx.scanJob"
        repositoryPath: "$.repository"
        modulePath: ""
        threatModelPath: ""
        targetPath: "$item"
        moduleId: delta-scope
        moduleName: Delta Scope
        targetId: ""
        targetName: ""
        targetKind: function
        priority: null
        vulnerabilityClassFocus: delta-scoped
    - name: scan-target-to-analyze-finding
      from: scan-target
      to: analyze-finding
      fork: false
      mode: fanOut
      foreach: "$.candidates[*]"
      input:
        scanJob: "$input.scanJob"
        repositoryPath: "$input.repositoryPath"
        modulePath: "$input.modulePath"
        functionPath: "$input.targetPath"
        candidatePath: "$item"
    - name: analyze-finding-to-critique-finding
      from: analyze-finding
      to: critique-finding
      fork: false
      mode: map
      route:
        key: critic
        default: true
      outputSchema:
        $ref: "#/schemas/Analysis"
      outputSchemaDescription: Draft analysisSchema result for critic review
      input:
        scanJob: "$input.scanJob"
        repositoryPath: "$input.repositoryPath"
        modulePath: "$input.modulePath"
        functionPath: "$input.functionPath"
        candidatePath: "$input.candidatePath"
        draftAnalysisPath: ""
        analysisFingerprint: "$computed.analysisFingerprint"
    - name: critique-finding-to-analyze-finding
      from: critique-finding
      to: analyze-finding
      fork: false
      mode: map
      route:
        key: analysis
        default: true
      outputSchema:
        $ref: "#/schemas/CriticResponse"
      outputSchemaDescription: CriticResponse feedback for analysis
      input:
        scanJob: "$input.scanJob"
        repositoryPath: "$input.repositoryPath"
        modulePath: "$input.modulePath"
        functionPath: "$input.functionPath"
        candidatePath: "$input.candidatePath"
        feedbackPath: ""
    - name: analyze-finding-to-verify-finding
      from: analyze-finding
      to: verify-finding
      fork: false
      route:
        key: verification
        default: false
      outputSchema:
        $ref: "#/schemas/FinalAnalysis"
      outputSchemaDescription: Final critic-approved analysis result
    - name: verify-finding-to-triage-finding
      from: verify-finding
      to: triage-finding
      fork: false
      outputSchema:
        $ref: "#/schemas/Verification"
  groups: []
