    moduleId:
      type: string
    moduleName:
      type: string
    targetId:
      type: string
    targetName:
      type: string
    targetKind:
      $ref: "#/schemas/TargetKind"
    language:
      type: [string, "null"]
    framework:
      type: [string, "null"]
    sourceFiles:
      type: array
      minItems: 1
      items:
        type: string
    filePath:
      type: [string, "null"]
    line:
      type: [integer, "null"]
    routePath:
      type: [string, "null"]
    httpMethods:
      type: array
      items:
        type: string
    priority:
      type: integer
    summary:
      type: [string, "null"]
    attackerInputs:
      type: array
      items:
        type: string
    sinks:
      type: array
      items:
        type: string
    trustBoundary:
      type: [string, "null"]
    likelyVulnerabilityTypes:
      type: array
      items:
        type: string
    evidence:
      type: array
      items:
        type: string
    score:
      type: [number, "null"]
    excludeReason:
      type: [string, "null"]
    priorityReason:
      type: string
