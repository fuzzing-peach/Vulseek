    - kind
    - summary
    - filePath
    - line
    - symbol
    - command
    - artifactPath
    - observation
    - supports
    - contradicts
    - confidenceImpact
  additionalProperties: false
  properties:
    id:
      type: string
    kind:
      enum: [code, runtime, fuzz, negative, assumption, external]
    summary:
      type: string
    filePath:
      type: [string, "null"]
    line:
      type: [integer, "null"]
    symbol:
      type: [string, "null"]
    command:
      type: [string, "null"]
    artifactPath:
      type: [string, "null"]
    observation:
      type: [string, "null"]
    supports:
      type: array
      items:
        type: string
    contradicts:
      type: array
      items:
        type: string
    confidenceImpact:
      type: [string, "null"]
