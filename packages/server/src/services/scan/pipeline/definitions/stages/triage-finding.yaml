triage-finding:
  key: triageFinding
  name: Triage Finding
  role: verification
  group: review
  concurrency: 1
  maxConcurrency: 8
  disableable: true
  description: Final security classification and severity.
  runtimeConfig:
    persistent: true
    reuseContainer: true
    mode: fanout
    nullableOutput: false
    cwd: /workspace/repo
    skills: [triage-finding]
    promptFile: triage-finding.prompt.md
  inputSchema:
    $ref: "#/schemas/TriageFindingStageInput"
  outputSchema:
    $ref: "#/schemas/Triage"
